<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upkeep Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@600&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* === CSS CUSTOM PROPERTIES === */
    :root {
      --primary: #C0396B;
      --text: #4A3033;
      --bg: #F5E6E8;
      --secondary-bg: #E8C4CF;
      --cards: #FFFFFF;
      --cat-health: #e74c3c;
      --cat-car: #e67e22;
      --cat-beauty: #e91e8f;
      --cat-grooming: #9b59b6;
      --cat-home: #27ae60;
      --cat-finance: #f1c40f;
      --cat-other: #95a5a6;
    }

    /* === RESET & BASE === */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* === TYPOGRAPHY === */
    .logo {
      font-family: 'Pacifico', cursive;
      font-size: 1.6rem;
      color: var(--primary);
      text-decoration: none;
      white-space: nowrap;
    }

    h1, h2, h3, .card-name, .modal-title {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      color: var(--text);
    }

    /* === HEADER === */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1px solid var(--secondary-bg);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* === STATS PILLS === */
    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .stat-gray {
      background: #e0e0e0;
      color: #555;
    }

    .stat-red {
      background: #fde2e2;
      color: #c0392b;
    }

    .stat-amber {
      background: #fef3d0;
      color: #b8860b;
    }

    .stat-green {
      background: #d4efdf;
      color: #1e8449;
    }

    /* === BUTTONS === */
    .btn-primary {
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover {
      background: #a93060;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-secondary {
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      background: var(--secondary-bg);
      color: var(--text);
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-secondary:hover {
      background: #dbb0be;
    }

    .btn-icon {
      font-family: 'Quicksand', sans-serif;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 6px;
      color: #999;
      transition: color 0.2s, background 0.2s;
    }

    .btn-icon:hover {
      color: var(--text);
      background: var(--bg);
    }

    .btn-delete.confirming {
      background: #e74c3c;
      color: white;
      border-radius: 6px;
    }

    /* === FILTER BAR === */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .filter-bar::-webkit-scrollbar {
      display: none;
    }

    .filter-pill {
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      padding: 6px 16px;
      border-radius: 20px;
      border: 2px solid var(--secondary-bg);
      background: var(--cards);
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .filter-pill:hover {
      border-color: var(--primary);
    }

    .filter-pill.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* === MAIN CONTENT === */
    .main {
      padding: 0 20px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* === CARD GRID === */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
      gap: 14px;
    }

    /* === CARDS === */
    .card {
      background: var(--cards);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.13);
    }

    .card-overdue {
      border-left: 4px solid #e74c3c;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-category {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .card-actions-top {
      display: flex;
      gap: 2px;
    }

    .card-name {
      font-size: 1.05rem;
      line-height: 1.3;
    }

    /* === CARD STAT BOXES === */
    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-box {
      background: var(--bg);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      font-weight: 600;
    }

    .stat-value {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }

    /* === DUE BADGES === */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-red {
      background: #fde2e2;
      color: #c0392b;
    }

    .badge-amber {
      background: #fef3d0;
      color: #b8860b;
    }

    .badge-yellow {
      background: #fff9e0;
      color: #a88c00;
    }

    .badge-green {
      background: #d4efdf;
      color: #1e8449;
    }

    .badge-purple {
      background: #ede7f6;
      color: #7b1fa2;
    }

    .badge-gray {
      background: #ececec;
      color: #888;
    }

    /* === CARD NOTES === */
    .card-notes {
      font-size: 0.8rem;
      color: #888;
      line-height: 1.4;
    }

    /* === CARD DONE BUTTON === */
    .btn-done {
      width: 100%;
      margin-top: auto;
    }

    /* === CARD LOADING OVERLAY === */
    .card-loading {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .spinner-small {
      width: 24px;
      height: 24px;
      border: 3px solid var(--secondary-bg);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* === LOADING SPINNER === */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      flex-direction: column;
      gap: 14px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--secondary-bg);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 0.9rem;
      color: #999;
      font-weight: 500;
    }

    /* === ERROR STATE === */
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 14px;
    }

    .error-state p {
      font-size: 1rem;
      color: #999;
      font-weight: 500;
    }

    /* === EMPTY STATE === */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 1rem;
      font-weight: 500;
    }

    /* === MODAL === */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(74, 48, 51, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }

    .modal {
      background: var(--cards);
      border-radius: 24px;
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 440px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 1.25rem;
    }

    .modal-close {
      font-family: 'Quicksand', sans-serif;
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #aaa;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .modal-close:hover {
      color: var(--text);
      background: var(--bg);
    }

    /* === FORM FIELDS === */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #999;
    }

    .form-group input[type="text"],
    .form-group input[type="date"],
    .form-group input[type="number"],
    .form-group select,
    .form-group textarea {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      padding: 10px 14px;
      border: 2px solid var(--secondary-bg);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 70px;
    }

    .freq-inline {
      display: flex;
      gap: 8px;
    }

    .freq-inline input[type="number"] {
      width: 80px;
    }

    .freq-inline select {
      flex: 1;
    }

    .form-actions {
      padding-top: 4px;
    }

    .form-actions .btn-primary {
      width: 100%;
    }

    /* === TOAST === */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 12px 24px;
      border-radius: 12px;
      color: #fff;
      pointer-events: auto;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      text-align: center;
      max-width: 340px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast-success {
      background: #27ae60;
    }

    .toast-error {
      background: #e74c3c;
    }

    /* === RESPONSIVE === */
    @media (max-width: 600px) {
      .header {
        padding: 12px 14px;
        flex-direction: column;
        align-items: flex-start;
      }

      .header-left {
        width: 100%;
        justify-content: space-between;
      }

      .header-right {
        width: 100%;
        justify-content: flex-end;
      }

      .filter-bar {
        padding: 10px 14px;
      }

      .main {
        padding: 0 14px 30px;
      }

      .card-grid {
        grid-template-columns: 1fr;
      }

      .modal {
        padding: 22px 18px 20px;
        border-radius: 20px;
      }

      .stats {
        gap: 6px;
      }

      .stat-pill {
        font-size: 0.72rem;
        padding: 3px 10px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <span class="logo">Upkeep</span>
      <div class="stats" id="stats"></div>
    </div>
    <div class="header-right">
      <button class="btn-secondary" id="gcalBtn" onclick="handleGCalClick()">Connect Google Calendar</button>
      <button class="btn-primary" onclick="openModal()">+ Add Item</button>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-pill active" data-category="all" onclick="setFilter('all')">All</button>
    <button class="filter-pill" data-category="Health" onclick="setFilter('Health')">❤️ Health</button>
    <button class="filter-pill" data-category="Car" onclick="setFilter('Car')">🚗 Car</button>
    <button class="filter-pill" data-category="Beauty" onclick="setFilter('Beauty')">💄 Beauty</button>
    <button class="filter-pill" data-category="Grooming" onclick="setFilter('Grooming')">✂️ Grooming</button>
    <button class="filter-pill" data-category="Home" onclick="setFilter('Home')">🏠 Home</button>
    <button class="filter-pill" data-category="Finance" onclick="setFilter('Finance')">💰 Finance</button>
    <button class="filter-pill" data-category="Other" onclick="setFilter('Other')">📌 Other</button>
  </div>

  <main class="main">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span class="loading-text">Loading your items...</span>
    </div>

    <div class="error-state" id="errorState" style="display:none">
      <p>Could not load items... please try again.</p>
      <button class="btn-primary" onclick="init()">Retry</button>
    </div>

    <div class="card-grid" id="cardGrid"></div>

    <div class="empty-state" id="emptyState" style="display:none">No items yet... add one!</div>
  </main>

  <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOnBackdrop(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add new item</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <form id="itemForm" onsubmit="handleSubmit(event)">
        <input type="hidden" id="editId" value="">
        <div class="form-group">
          <label for="fieldName">Item Name</label>
          <input type="text" id="fieldName" required placeholder="e.g. Oil change">
        </div>
        <div class="form-group">
          <label for="fieldCategory">Category</label>
          <select id="fieldCategory">
            <option value="Health">❤️ Health</option>
            <option value="Car">🚗 Car</option>
            <option value="Beauty">💄 Beauty</option>
            <option value="Grooming">✂️ Grooming</option>
            <option value="Home">🏠 Home</option>
            <option value="Finance">💰 Finance</option>
            <option value="Other" selected>📌 Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Frequency</label>
          <div class="freq-inline">
            <input type="number" id="fieldFreqValue" min="1" value="1" required>
            <select id="fieldFreqUnit">
              <option value="days">Days</option>
              <option value="weeks">Weeks</option>
              <option value="months" selected>Months</option>
              <option value="years">Years</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="fieldLastDone">Last Done</label>
          <input type="date" id="fieldLastDone">
        </div>
        <div class="form-group">
          <label for="fieldNotes">Notes</label>
          <textarea id="fieldNotes" placeholder="Optional notes..."></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" id="submitBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // === GOOGLE CALENDAR ===
    let tokenClient = null;

    function initGCal() {
      if (typeof google === 'undefined' || !google.accounts) return;
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GCAL_CLIENT_ID,
        scope: GCAL_SCOPE,
        callback: (response) => {
          if (response.access_token) {
            gcalToken = response.access_token;
            sessionStorage.setItem('gcal_token', gcalToken);
            updateGCalButton();
            showToast('Google Calendar connected');
          }
        }
      });
    }

    function handleGCalClick() {
      if (gcalToken) {
        gcalToken = null;
        sessionStorage.removeItem('gcal_token');
        updateGCalButton();
        showToast('Google Calendar disconnected');
      } else {
        if (!tokenClient) initGCal();
        if (tokenClient) {
          tokenClient.requestAccessToken();
        } else {
          showToast('Google sign-in not available', 'error');
        }
      }
    }

    function updateGCalButton() {
      const btn = document.getElementById('gcalBtn');
      if (gcalToken) {
        btn.textContent = '✅ Calendar connected';
        btn.classList.add('connected');
      } else {
        btn.textContent = 'Connect Google Calendar';
        btn.classList.remove('connected');
      }
    }

    async function gcalFetch(endpoint, options = {}) {
      const res = await fetch(`https://www.googleapis.com/calendar/v3${endpoint}`, {
        ...options,
        headers: {
          'Authorization': `Bearer ${gcalToken}`,
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      });
      if (res.status === 401) {
        gcalToken = null;
        sessionStorage.removeItem('gcal_token');
        updateGCalButton();
        throw new Error('Calendar session expired... please reconnect');
      }
      if (!res.ok && res.status !== 404) {
        throw new Error(`Calendar error: ${res.status}`);
      }
      if (res.status === 204 || res.status === 404) return null;
      return res.json();
    }

    async function createGCalEvent(itemName, dateStr) {
      const data = await gcalFetch('/calendars/primary/events', {
        method: 'POST',
        body: JSON.stringify({
          summary: itemName,
          start: { date: dateStr },
          end: { date: dateStr },
          colorId: '2',
          reminders: {
            useDefault: false,
            overrides: [{ method: 'popup', minutes: 4320 }]
          }
        })
      });
      return data?.id || '';
    }

    async function deleteGCalEvent(eventId) {
      await gcalFetch(`/calendars/primary/events/${eventId}`, {
        method: 'DELETE'
      });
    }

    async function createGCalEventForItem(item) {
      const next = nextDueDate(item.lastDone, item.frequency);
      if (!next) return;
      try {
        const eventId = await createGCalEvent(item.name, next);
        if (eventId) {
          await updateItem(item.id, { ...item, calendarEventId: eventId });
          const idx = items.findIndex(i => i.id === item.id);
          if (idx >= 0) items[idx].calendarEventId = eventId;
        }
      } catch (err) {
        console.error('GCal event creation failed:', err);
      }
    }

    async function recreateGCalEvent(item) {
      try {
        if (item.calendarEventId) {
          await deleteGCalEvent(item.calendarEventId).catch(() => {});
        }
        await createGCalEventForItem(item);
      } catch (err) {
        console.error('GCal event recreation failed:', err);
      }
    }

    // === MODAL ===
    function openModal(editItem = null) {
      const overlay = document.getElementById('modalOverlay');
      const title = document.getElementById('modalTitle');
      const form = document.getElementById('itemForm');
      const editingId = document.getElementById('editId');
      const submitBtn = document.getElementById('submitBtn');

      form.reset();
      editingId.value = '';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Save';

      if (editItem) {
        title.textContent = 'Edit item';
        editingId.value = editItem.id;
        document.getElementById('fieldName').value = editItem.name;
        document.getElementById('fieldCategory').value = editItem.category;
        const { value, unit } = daysToFreqInput(editItem.frequency);
        document.getElementById('fieldFreqValue').value = value;
        document.getElementById('fieldFreqUnit').value = unit;
        document.getElementById('fieldLastDone').value = editItem.lastDone || '';
        document.getElementById('fieldNotes').value = editItem.notes || '';
      } else {
        title.textContent = 'Add new item';
      }

      overlay.style.display = 'flex';
    }

    function daysToFreqInput(days) {
      if (days % 365 === 0) return { value: days / 365, unit: 'years' };
      if (days % 30 === 0) return { value: days / 30, unit: 'months' };
      if (days % 7 === 0) return { value: days / 7, unit: 'weeks' };
      return { value: days, unit: 'days' };
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
    }

    function closeModalOnBackdrop(e) {
      if (e.target === e.currentTarget) closeModal();
    }

    function openEditModal(itemId) {
      const item = items.find(i => i.id === itemId);
      if (item) openModal(item);
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      const editingId = document.getElementById('editId').value;

      const formData = {
        name: document.getElementById('fieldName').value.trim(),
        category: document.getElementById('fieldCategory').value,
        frequency: freqToDays(
          parseInt(document.getElementById('fieldFreqValue').value),
          document.getElementById('fieldFreqUnit').value
        ),
        lastDone: document.getElementById('fieldLastDone').value || null,
        notes: document.getElementById('fieldNotes').value.trim()
      };

      if (!formData.name || !formData.frequency || formData.frequency <= 0) {
        showToast('Please fill in required fields', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';

      try {
        if (editingId) {
          const oldItem = items.find(i => i.id === editingId);
          const updated = await updateItem(editingId, formData);
          const idx = items.findIndex(i => i.id === editingId);
          items[idx] = updated;

          if (gcalToken && oldItem &&
              (oldItem.frequency !== formData.frequency || oldItem.name !== formData.name)) {
            await recreateGCalEvent(updated);
          }

          showToast('Item updated');
        } else {
          const created = await createItem(formData);
          items.push(created);

          if (gcalToken && created.lastDone) {
            await createGCalEventForItem(created);
          }

          showToast('Item added');
        }
        closeModal();
        renderCards();
      } catch (err) {
        showToast(`Save failed: ${err.message}`, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save';
      }
    }

    // === ACTIONS ===
    async function handleMarkDone(itemId) {
      const card = document.getElementById(`card-${itemId}`);
      const loadingEl = card.querySelector('.card-loading');
      loadingEl.style.display = 'flex';

      try {
        const item = items.find(i => i.id === itemId);
        const today = todayStr();
        const updates = { ...item, lastDone: today };

        if (gcalToken) {
          try {
            if (item.calendarEventId) {
              await deleteGCalEvent(item.calendarEventId).catch(() => {});
            }
            const newNext = nextDueDate(today, item.frequency);
            if (newNext) {
              const eventId = await createGCalEvent(item.name, newNext);
              updates.calendarEventId = eventId || '';
            }
          } catch (gcalErr) {
            console.error('GCal error during mark done:', gcalErr);
          }
        }

        const updated = await updateItem(itemId, updates);
        const idx = items.findIndex(i => i.id === itemId);
        items[idx] = updated;
        renderCards();
        showToast(`${item.name} marked done`);
      } catch (err) {
        loadingEl.style.display = 'none';
        showToast(`Failed to mark done: ${err.message}`, 'error');
      }
    }

    const deleteTimers = {};

    function handleDelete(btn, itemId) {
      if (btn.classList.contains('confirming')) {
        clearTimeout(deleteTimers[itemId]);
        btn.classList.remove('confirming');
        btn.textContent = '✕';
        performDelete(itemId);
      } else {
        btn.classList.add('confirming');
        btn.textContent = 'Confirm?';
        deleteTimers[itemId] = setTimeout(() => {
          btn.classList.remove('confirming');
          btn.textContent = '✕';
        }, 3000);
      }
    }

    async function performDelete(itemId) {
      const card = document.getElementById(`card-${itemId}`);
      const loadingEl = card.querySelector('.card-loading');
      loadingEl.style.display = 'flex';

      try {
        const item = items.find(i => i.id === itemId);

        if (gcalToken && item.calendarEventId) {
          await deleteGCalEvent(item.calendarEventId).catch(() => {});
        }

        await archiveItem(itemId);
        items = items.filter(i => i.id !== itemId);
        renderCards();
        showToast(`${item.name} deleted`);
      } catch (err) {
        loadingEl.style.display = 'none';
        showToast(`Failed to delete: ${err.message}`, 'error');
      }
    }

    // Close modal on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // === CONFIG ===
    const NOTION_PROXY = 'https://corsproxy.io/?url=https://api.notion.com';
    const NOTION_TOKEN = 'REDACTED_TOKEN';
    const NOTION_DB = 'beaf32f0b4f541c9a1e50be57fe7cd62';
    const NOTION_VERSION = '2022-06-28';
    const GCAL_CLIENT_ID = '5655386906-q337i8k06j5s8112rvitom9fdph6po6l.apps.googleusercontent.com';
    const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.events';

    const CATEGORIES = {
      Health:   { emoji: '❤️', color: '#e74c3c' },
      Car:      { emoji: '🚗', color: '#e67e22' },
      Beauty:   { emoji: '💄', color: '#e91e8f' },
      Grooming: { emoji: '✂️', color: '#9b59b6' },
      Home:     { emoji: '🏠', color: '#27ae60' },
      Finance:  { emoji: '💰', color: '#f1c40f' },
      Other:    { emoji: '📌', color: '#95a5a6' }
    };

    // === STATE ===
    let items = [];
    let activeFilter = 'all';
    let gcalToken = sessionStorage.getItem('gcal_token') || null;

    // === UTILITIES ===
    const FREQ_MULTIPLIERS = { days: 1, weeks: 7, months: 30, years: 365 };

    function freqToDays(value, unit) {
      return value * (FREQ_MULTIPLIERS[unit] || 1);
    }

    const NAMED_FREQUENCIES = {
      1: 'Daily', 7: 'Weekly', 14: 'Every 2 weeks', 30: 'Monthly',
      60: 'Every 2 months', 90: 'Quarterly', 180: 'Every 6 months', 365: 'Yearly'
    };

    function freqLabel(days) {
      if (NAMED_FREQUENCIES[days]) return NAMED_FREQUENCIES[days];
      if (days % 365 === 0) return `Every ${days / 365} years`;
      if (days % 30 === 0) return `Every ${days / 30} months`;
      if (days % 7 === 0) return `Every ${days / 7} weeks`;
      return `Every ${days} days`;
    }

    function daysBetween(dateStr, today) {
      const d = new Date(dateStr + 'T00:00:00');
      const t = new Date(today + 'T00:00:00');
      return Math.round((d - t) / 86400000);
    }

    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }

    function nextDueDate(lastDone, freqDays) {
      if (!lastDone) return null;
      const d = new Date(lastDone + 'T00:00:00');
      d.setDate(d.getDate() + freqDays);
      return d.toISOString().split('T')[0];
    }

    function daysUntilDue(lastDone, freqDays) {
      const next = nextDueDate(lastDone, freqDays);
      if (!next) return null;
      return daysBetween(next, todayStr());
    }

    function dueBadge(daysLeft) {
      if (daysLeft === null) return { class: 'badge-gray', text: 'no date' };
      if (daysLeft < 0) return { class: 'badge-red', text: `${Math.abs(daysLeft)}d overdue` };
      if (daysLeft === 0) return { class: 'badge-amber', text: 'due today!' };
      if (daysLeft <= 7) return { class: 'badge-yellow', text: `in ${daysLeft}d` };
      if (daysLeft <= 30) return { class: 'badge-green', text: `in ${daysLeft} days` };
      return { class: 'badge-purple', text: `in ${daysLeft} days` };
    }

    // === TOASTS ===
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // === NOTION API ===
    async function notionFetch(endpoint, options = {}) {
      const url = `${NOTION_PROXY}/v1${endpoint}`;
      const res = await fetch(url, {
        ...options,
        headers: {
          'Authorization': `Bearer ${NOTION_TOKEN}`,
          'Notion-Version': NOTION_VERSION,
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Notion API error: ${res.status}`);
      }
      return res.json();
    }

    async function loadItems() {
      let allPages = [];
      let cursor = undefined;
      do {
        const body = { page_size: 100 };
        if (cursor) body.start_cursor = cursor;
        const data = await notionFetch(`/databases/${NOTION_DB}/query`, {
          method: 'POST',
          body: JSON.stringify(body)
        });
        allPages = allPages.concat(data.results);
        cursor = data.has_more ? data.next_cursor : undefined;
      } while (cursor);
      return allPages.map(parseNotionPage);
    }

    function parseNotionPage(page) {
      const p = page.properties;
      return {
        id: page.id,
        name: p['Item Name']?.title?.[0]?.plain_text || '',
        category: p['Category']?.multi_select?.[0]?.name || 'Other',
        frequency: p['Frequency (days)']?.number || 30,
        lastDone: p['Last Done']?.date?.start || null,
        notes: p['Notes']?.rich_text?.[0]?.plain_text || '',
        calendarEventId: p['Calendar Event ID']?.rich_text?.[0]?.plain_text || ''
      };
    }

    function notionProperties(item) {
      const props = {
        'Item Name': { title: [{ text: { content: item.name } }] },
        'Category': { multi_select: [{ name: item.category }] },
        'Frequency (days)': { number: item.frequency },
        'Notes': { rich_text: item.notes ? [{ text: { content: item.notes } }] : [] }
      };
      if (item.lastDone) {
        props['Last Done'] = { date: { start: item.lastDone } };
      } else if (item.lastDone === null) {
        props['Last Done'] = { date: null };
      }
      if (item.calendarEventId !== undefined) {
        props['Calendar Event ID'] = {
          rich_text: item.calendarEventId ? [{ text: { content: item.calendarEventId } }] : []
        };
      }
      return props;
    }

    async function createItem(item) {
      const data = await notionFetch('/pages', {
        method: 'POST',
        body: JSON.stringify({
          parent: { database_id: NOTION_DB },
          properties: notionProperties(item)
        })
      });
      return parseNotionPage(data);
    }

    async function updateItem(pageId, updates) {
      const data = await notionFetch(`/pages/${pageId}`, {
        method: 'PATCH',
        body: JSON.stringify({ properties: notionProperties(updates) })
      });
      return parseNotionPage(data);
    }

    async function archiveItem(pageId) {
      await notionFetch(`/pages/${pageId}`, {
        method: 'PATCH',
        body: JSON.stringify({ archived: true })
      });
    }

    // === RENDERING ===
    function renderCard(item) {
      const days = daysUntilDue(item.lastDone, item.frequency);
      const badge = dueBadge(days);
      const nextDue = nextDueDate(item.lastDone, item.frequency);
      const cat = CATEGORIES[item.category] || CATEGORIES.Other;
      const isOverdue = days !== null && days < 0;

      return `
        <div class="card ${isOverdue ? 'card-overdue' : ''}" data-id="${item.id}" id="card-${item.id}">
          <div class="card-header">
            <span class="card-category" style="color:${cat.color}">${cat.emoji} ${item.category}</span>
            <div class="card-actions-top">
              <button class="btn-icon btn-edit" onclick="openEditModal('${item.id}')" title="Edit">✏</button>
              <button class="btn-icon btn-delete" data-id="${item.id}" onclick="handleDelete(this, '${item.id}')" title="Delete">✕</button>
            </div>
          </div>
          <h3 class="card-name">${escapeHtml(item.name)}</h3>
          <div class="card-stats">
            <div class="stat-box">
              <span class="stat-label">Last done</span>
              <span class="stat-value">${item.lastDone || '...'}</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">Frequency</span>
              <span class="stat-value">${freqLabel(item.frequency)}</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">Next due</span>
              <span class="stat-value">${nextDue || '...'}</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">Status</span>
              <span class="stat-value badge ${badge.class}">${badge.text}</span>
            </div>
          </div>
          ${item.notes ? `<p class="card-notes">${escapeHtml(item.notes)}</p>` : ''}
          <button class="btn-primary btn-done" onclick="handleMarkDone('${item.id}')">✓ Mark as Done</button>
          <div class="card-loading" style="display:none"><div class="spinner-small"></div></div>
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderCards() {
      const grid = document.getElementById('cardGrid');
      const empty = document.getElementById('emptyState');

      const filtered = activeFilter === 'all'
        ? items
        : items.filter(i => i.category === activeFilter);

      const sorted = [...filtered].sort((a, b) => {
        const da = daysUntilDue(a.lastDone, a.frequency);
        const db = daysUntilDue(b.lastDone, b.frequency);
        if (da === null && db === null) return 0;
        if (da === null) return 1;
        if (db === null) return -1;
        return da - db;
      });

      if (sorted.length === 0) {
        grid.innerHTML = '';
        const catLabel = activeFilter === 'all' ? '' : activeFilter;
        empty.textContent = catLabel ? `No ${catLabel} items yet` : 'No items yet... add one!';
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        grid.innerHTML = sorted.map(renderCard).join('');
      }

      renderStats();
    }

    function renderStats() {
      const stats = document.getElementById('stats');
      const total = items.length;
      let overdue = 0, soon = 0, onTrack = 0;
      items.forEach(item => {
        const d = daysUntilDue(item.lastDone, item.frequency);
        if (d === null) return;
        if (d < 0) overdue++;
        else if (d <= 14) soon++;
        else onTrack++;
      });

      let html = `<span class="stat-pill stat-gray">${total} tracked</span>`;
      if (overdue) html += `<span class="stat-pill stat-red">${overdue} overdue</span>`;
      if (soon) html += `<span class="stat-pill stat-amber">${soon} soon</span>`;
      if (onTrack) html += `<span class="stat-pill stat-green">${onTrack} on track</span>`;
      stats.innerHTML = html;
    }

    function setFilter(category) {
      activeFilter = category;
      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.category === category);
      });
      renderCards();
    }

    // === INIT ===
    async function init() {
      initGCal();
      const loading = document.getElementById('loading');
      const errorState = document.getElementById('errorState');
      const grid = document.getElementById('cardGrid');

      loading.style.display = 'flex';
      errorState.style.display = 'none';
      grid.innerHTML = '';

      try {
        items = await loadItems();
        loading.style.display = 'none';
        renderCards();
        updateGCalButton();
      } catch (err) {
        loading.style.display = 'none';
        errorState.style.display = 'flex';
        console.error('Failed to load:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
